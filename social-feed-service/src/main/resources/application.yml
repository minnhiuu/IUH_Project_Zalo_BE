spring:
  application:
    name: social-feed-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://bh-config-server:8888}"
  cloud:
    config:
      name: social-feed-service,application
      uri: ${CONFIG_SERVER_URL:http://bh-config-server:8888}
      fail-fast: false
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1