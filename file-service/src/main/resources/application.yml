spring:
  application:
    name: file-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://bh-config-server:8888}"
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://bh-config-server:8888}
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

# Fallback configuration if config-server unavailable
server:
  port: 8085

# Enable actuator endpoints for debugging
management:
  endpoints:
    web:
      exposure:
        include: health,info,env

# Environment variable defaults
EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

