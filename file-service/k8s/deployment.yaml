apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service-deploy
  namespace: bondhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      nodeSelector:
        node-type: core-social
      initContainers:
        - name: wait-for-infra
          image: busybox
          command: ['sh', '-c', 'until nc -z bh-discovery-server 8761 && nc -z bh-config-server 8888; do if ! nc -z bh-discovery-server 8761; then echo "Waiting for bh-discovery-server:8761..."; fi; if ! nc -z bh-config-server 8888; then echo "Waiting for bh-config-server:8888..."; fi; sleep 5; done; echo "Infrastructure services are UP!";']
      containers:
        - name: file-service
          image: 952647925716.dkr.ecr.ap-southeast-2.amazonaws.com/bondhub/file-service:latest
          ports:
            - containerPort: 8085
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: bondhub-common-config
            - secretRef:
                name: bondhub-common-secrets
