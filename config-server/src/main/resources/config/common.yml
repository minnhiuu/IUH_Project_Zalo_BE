# Common Kafka Configuration for All Services
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    # Common Producer Configuration
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        linger.ms: 10
        batch.size: 16384
        max.in.flight.requests.per.connection: 5
        enable.idempotence: true
        compression.type: snappy

    # Common Consumer Configuration
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
        max.poll.records: 500
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000

    # Listener Configuration
    listener:
      ack-mode: manual
      concurrency: 3

    # Admin Configuration
    admin:
      properties:
        bootstrap.servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Kafka Topics Configuration
kafka:
  topics:
    # Authentication & User Events
    user-registered: user.registered
    user-updated: user.updated
    user-deleted: user.deleted
    user-login: user.login
    user-logout: user.logout
    password-reset: user.password-reset

    # Message Events
    message-sent: message.sent
    message-delivered: message.delivered
    message-read: message.read
    message-deleted: message.deleted

    # Notification Events
    notification-created: notification.created
    notification-sent: notification.sent
    notification-failed: notification.failed
    notification-delivered: notification.delivered

    # System Events
    system-alert: system.alert
    audit-log: audit.log
