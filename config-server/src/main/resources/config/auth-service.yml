server:
  port: 8084

spring:
  application:
    name: auth-service

  messages:
    basename: i18n/messages, i18n/messages-auth

    # MongoDB Configuration
  data:
    mongodb:
      uri: ${MONGODB_URI_AUTH}
      auto-index-creation: true
      uuid-representation: standard
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Kafka Configuration for Auth Service
  kafka:
    # Producer configuration for authentication events
    producer:
      client-id: auth-service-producer
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 5

    # Consumer configuration (if needed for user sync events)
    consumer:
      group-id: auth-service-group
      client-id: auth-service-consumer

    # Listener configuration
    listener:
      concurrency: 2
      ack-mode: manual

app:
  cookie:
    secure: ${COOKIE_SECURE} # Set to true in production
    same-site: ${COOKIE_SAME_SITE}
    path: ${COOKIE_PATH}

# Service-specific logging overrides
logging:
  level:
    com.bondhub.authservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/auth-service.log

# Service-specific resilience4j overrides
resilience4j:
  circuitbreaker:
    instances:
      authService:
        base-config: default

  retry:
    instances:
      authService:
        base-config: default

  timelimiter:
    instances:
      authService:
        base-config: default

# JWT Configuration (fallback - should be configured in config-server)
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000 # 1 hour
  refresh-token-expiration: 604800000 # 7 days

# Brevo Email Configuration
brevo:
  api-key: ${BREVO_API_KEY}
  sender:
    name: ${BREVO_SENDER_NAME}
  template:
    otp-verification-id: ${BREVO_OTP_TEMPLATE_ID}

# OTP Configuration
otp:
  length: 6 # Number of digits in OTP
  ttl-seconds: 300 # 5 minutes
  max-attempts: 5 # Maximum validation attempts before OTP is deleted
  cooldown-seconds: 60 # Cooldown between OTP generation requests (1 minute)

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: false

# Security Configuration - Auth service uses its own SecurityConfig, not CommonSecurityConfig
bondhub:
  security:
    gateway-auth:
      enabled: false # Disable CommonSecurityConfig for auth-service

# QR Configuration
qr:
  expiration-seconds: ${QR_EXPIRATION_SECONDS}
  content-prefix: ${QR_CONTENT_PREFIX}
  wait-timeout-ms: ${QR_WAIT_TIMEOUT_MS}
