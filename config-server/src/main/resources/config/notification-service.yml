server:
  port: 8083

spring:
  application:
    name: notification-service

  messages:
    basename: i18n/messages, i18n/messages-notification

  # MongoDB Configuration
  data:
    mongodb:
      uri: ${MONGODB_URI_NOTIFICATIONS}
      auto-index-creation: true
      uuid-representation: standard

  # Kafka Configuration for Notification Service
  kafka:
    # Producer configuration for notification status events
    producer:
      client-id: notification-service-producer
      retries: 3

    # Consumer configuration for incoming notification requests
    consumer:
      group-id: notification-service-group
      client-id: notification-service-consumer
      max-poll-records: 50
      properties:
        max.poll.interval.ms: 600000 # 10 minutes for processing notifications

    # Listener configuration
    listener:
      concurrency: 2
      ack-mode: manual

# Service-specific logging overrides
logging:
  level:
    com.bondhub.notificationservices: DEBUG
    org.springframework.mail: DEBUG
  file:
    name: logs/notification-service.log

# Service-specific resilience4j overrides
resilience4j:
  circuitbreaker:
    instances:
      notificationService:
        base-config: default

  retry:
    instances:
      notificationService:
        base-config: default

  timelimiter:
    instances:
      notificationService:
        base-config: default

# Service-specific security configuration
bondhub:
  security:
    public-endpoints: []

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: false
