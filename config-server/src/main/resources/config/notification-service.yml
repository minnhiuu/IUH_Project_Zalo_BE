server:
  port: 8083

spring:
  application:
    name: notification-service

  messages:
    basename: i18n/messages, i18n/messages-notification

  # MongoDB Configuration
  data:
    mongodb:
      uri: ${MONGODB_URI_NOTIFICATIONS}
      auto-index-creation: true
      uuid-representation: standard

  # Kafka Configuration for Notification Service
  kafka:
    # Producer configuration for notification status events
    producer:
      client-id: notification-service-producer
      retries: 3

    # Consumer configuration for incoming notification requests
    consumer:
      group-id: notification-service-group
      client-id: notification-service-consumer
      max-poll-records: 50
      properties:
        max.poll.interval.ms: 600000 # 10 minutes for processing notifications

    # Listener configuration
    listener:
      concurrency: 2
      ack-mode: manual

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      version: 0.0.1-SNAPSHOT
      environment: ${spring.profiles.active:default}

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh,env
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.bondhub.notificationservices: DEBUG
    org.springframework.web: INFO
    org.springframework.data.mongodb: DEBUG
    org.springframework.mail: DEBUG
  file:
    name: logs/notification-service.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      notificationService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 100
        slow-call-duration-threshold: 3s

  retry:
    instances:
      notificationService:
        max-attempts: 3
        wait-duration: 1s

  timelimiter:
    instances:
      notificationService:
        timeout-duration: 5s

# BondHub Security Configuration
bondhub:
  security:
    gateway-auth:
      enabled: true
    public-endpoints: []
