server:
  port: 8081

spring:
  application:
    name: user-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  messages:
    basename: i18n/messages, i18n/messages-user

  data:
    mongodb:
      uri: ${MONGODB_URI_USERS}
      auto-index-creation: true
      uuid-representation: standard

  # Kafka Configuration for User Service
  kafka:
    # Producer configuration for user events
    producer:
      client-id: user-service-producer
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 5

    # Consumer configuration for incoming events (if needed)
    consumer:
      group-id: user-service-group
      client-id: user-service-consumer
      max-poll-records: 100

    # Listener configuration
    listener:
      concurrency: 2
      ack-mode: manual

# Service-specific logging overrides
logging:
  level:
    root: INFO
    com.bondhub.userservice: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/user-service.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# Service-specific resilience4j overrides
resilience4j:
  circuitbreaker:
    instances:
      userService:
        base-config: default

  retry:
    instances:
      userService:
        base-config: default

  timelimiter:
    instances:
      userService:
        base-config: default

# Service-specific security configuration
bondhub:
  security:
    public-endpoints:
      - /users

# AWS S3 Configuration
cloud:
  aws:
    region:
      static: ${AWS_REGION}
aws:
  s3:
    bucket:
      name: ${AWS_S3_BUCKET_NAME}

# Elasticsearch Configuration
elasticsearch:
  # Bulk indexing settings
  sync:
    batch-size: 500 # Number of documents per batch
    max-retry: 3 # Max retry attempts for failed batches
    parallelism: ${ELASTICSEARCH_PARALLELISM:0} # 0 = auto-detect CPU cores

  # Real-time indexing settings
  index:
    realtime-threads: 2 # Thread pool size for real-time indexing
    async-timeout-seconds: 30 # Timeout for async operations

  # Index settings
  alias: users # Main index alias

  # Monitoring settings (for future use)
  monitoring:
    enabled: true
    log-slow-operations: true
    slow-operation-threshold-ms: 1000

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: false
