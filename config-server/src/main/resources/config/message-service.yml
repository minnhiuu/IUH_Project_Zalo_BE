server:
  port: 8082

spring:
  application:
    name: message-service

  messages:
    basename: i18n/messages, i18n/messages-message

  # MongoDB Configuration
  data:
    mongodb:
      uri: ${MONGODB_URI_MESSAGES}
      auto-index-creation: true
      uuid-representation: standard

  # Kafka Configuration for Message Service
  kafka:
    # Producer configuration for outgoing message events
    producer:
      client-id: message-service-producer
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 5

    # Consumer configuration for incoming events
    consumer:
      group-id: message-service-group
      client-id: message-service-consumer
      max-poll-records: 100

    # Listener configuration
    listener:
      concurrency: 3
      ack-mode: manual

# Service-specific logging overrides
logging:
  level:
    com.bondhub.messageservice: DEBUG
  file:
    name: logs/message-service.log

# Service-specific resilience4j overrides
resilience4j:
  circuitbreaker:
    instances:
      messageService:
        base-config: default

  retry:
    instances:
      messageService:
        base-config: default

  timelimiter:
    instances:
      messageService:
        base-config: default

# Service-specific security configuration
bondhub:
  security:
    public-endpoints: []

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: false
