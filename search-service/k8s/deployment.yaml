apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service-deploy
  namespace: bondhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      nodeSelector:
        node-type: interaction-ai
      initContainers:
        - name: wait-for-infra
          image: busybox
          command: ['sh', '-c', 'until nc -z bh-discovery-server 8761 && nc -z bh-config-server 8888 && nc -z bh-elasticsearch 9200 && nc -z bh-mongodb 27017; do if ! nc -z bh-discovery-server 8761; then echo "Waiting for bh-discovery-server:8761..."; fi; if ! nc -z bh-config-server 8888; then echo "Waiting for bh-config-server:8888..."; fi; if ! nc -z bh-elasticsearch 9200; then echo "Waiting for bh-elasticsearch:9200..."; fi; if ! nc -z bh-mongodb 27017; then echo "Waiting for bh-mongodb:27017..."; fi; sleep 5; done; echo "Infrastructure services are UP!";']
      containers:
        - name: search-service
          image: 952647925716.dkr.ecr.ap-southeast-2.amazonaws.com/bondhub/search-service:latest
          ports:
            - containerPort: 8089
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: bondhub-common-config
            - secretRef:
                name: bondhub-common-secrets
