apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server-deploy
  namespace: bondhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      nodeSelector:
        node-type: infra
      containers:
        - name: discovery-server
          image: 952647925716.dkr.ecr.ap-southeast-2.amazonaws.com/bondhub/discovery-server:latest
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8761
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: bondhub-common-config
            - secretRef:
                name: bondhub-common-secrets
