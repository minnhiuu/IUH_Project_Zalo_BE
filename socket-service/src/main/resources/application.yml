spring:
  application:
    name: socket-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://bh-config-server:8888}"
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://bh-config-server:8888}
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1

server:
  port: 8093