spring:
  application:
    name: api-gateway
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive # Force reactive mode for Gateway
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://bh-config-server:8888}"
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://bh-config-server:8888}
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

# Fallback configuration if config-server unavailable
server:
  port: 8080

# Enable actuator endpoints for debugging
management:
  endpoints:
    web:
      exposure:
        include: health,info,env

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://bh-discovery-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

# Environment variable defaults
CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

