spring:
  application:
    name: api-gateway
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive # Force reactive mode for Gateway
  config:
    import: "configserver:http://localhost:8888"
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

# Fallback configuration if config-server unavailable
server:
  port: 8080

# Enable actuator endpoints for debugging
management:
  endpoints:
    web:
      exposure:
        include: health,info,env

# Environment variable defaults
EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

# JWT Configuration (fallback - should be configured in config-server)
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}
