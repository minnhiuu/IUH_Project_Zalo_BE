# Gateway Fallback Messages (English)

# QR Wait Fallback
fallback.qr.wait.status=PENDING
fallback.qr.wait.message=Service is temporarily unavailable. Your request is being processed.

# Service Unavailable Messages
fallback.auth.service.name=Authentication Service
fallback.auth.service.message=The authentication service is temporarily unavailable. Please try again in a few moments.
fallback.auth.service.unavailable=Authentication Service Unavailable

fallback.user.service.name=User Service
fallback.user.service.message=The user service is temporarily unavailable. Please try again later.
fallback.user.service.unavailable=User Service Unavailable

fallback.message.service.name=Message Service
fallback.message.service.message=The messaging service is temporarily unavailable. Your messages are safe and will be accessible shortly.
fallback.message.service.unavailable=Message Service Unavailable

fallback.notification.service.name=Notification Service
fallback.notification.service.message=The notification service is temporarily unavailable. Notifications will be delivered once service is restored.
fallback.notification.service.unavailable=Notification Service Unavailable

# General Fallback
fallback.general.service.name=Gateway
fallback.general.message=The requested service is temporarily unavailable. Please try again later.
fallback.general.unavailable=Service Unavailable

# Timeout
fallback.timeout.service.name=Downstream Service
fallback.timeout.reason=Request timeout
fallback.timeout.message=The request took too long to complete. Please try again with a simpler request or contact support if the issue persists.
fallback.timeout.error=Request Timeout

# Common Fields
fallback.suggestion=Please retry your request. If the problem persists, contact support.
