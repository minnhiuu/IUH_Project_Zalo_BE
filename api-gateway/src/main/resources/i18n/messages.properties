# Gateway Fallback Messages (Vietnamese)

# QR Wait Fallback
fallback.qr.wait.status=PENDING
fallback.qr.wait.message=Dịch vụ tạm thời không khả dụng. Yêu cầu của bạn đang được xử lý.

# Service Unavailable Messages
fallback.auth.service.name=Dịch Vụ Xác Thực
fallback.auth.service.message=Dịch vụ xác thực tạm thời không khả dụng. Vui lòng thử lại sau vài phút.
fallback.auth.service.unavailable=Dịch Vụ Xác Thực Không Khả Dụng

fallback.user.service.name=Dịch Vụ Người Dùng
fallback.user.service.message=Dịch vụ người dùng tạm thời không khả dụng. Vui lòng thử lại sau.
fallback.user.service.unavailable=Dịch Vụ Người Dùng Không Khả Dụng

fallback.message.service.name=Dịch Vụ Tin Nhắn
fallback.message.service.message=Dịch vụ tin nhắn tạm thời không khả dụng. Tin nhắn của bạn được bảo mật và sẽ có thể truy cập sớm.
fallback.message.service.unavailable=Dịch Vụ Tin Nhắn Không Khả Dụng

fallback.notification.service.name=Dịch Vụ Thông Báo
fallback.notification.service.message=Dịch vụ thông báo tạm thời không khả dụng. Thông báo sẽ được gửi khi dịch vụ được khôi phục.
fallback.notification.service.unavailable=Dịch Vụ Thông Báo Không Khả Dụng

# General Fallback
fallback.general.service.name=Cổng API
fallback.general.message=Dịch vụ được yêu cầu tạm thời không khả dụng. Vui lòng thử lại sau.
fallback.general.unavailable=Dịch Vụ Không Khả Dụng

# Timeout
fallback.timeout.service.name=Dịch Vụ Downstream
fallback.timeout.reason=Hết thời gian yêu cầu
fallback.timeout.message=Yêu cầu mất quá nhiều thời gian để hoàn thành. Vui lòng thử lại với yêu cầu đơn giản hơn hoặc liên hệ hỗ trợ nếu vấn đề vẫn tiếp diễn.
fallback.timeout.error=Hết Thời Gian Yêu Cầu

# Common Fields
fallback.suggestion=Vui lòng thử lại yêu cầu của bạn. Nếu vấn đề vẫn tiếp diễn, hãy liên hệ hỗ trợ.
