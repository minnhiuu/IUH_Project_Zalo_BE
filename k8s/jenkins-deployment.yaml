apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: bondhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      nodeSelector:
        node-type: infra
      securityContext:
        runAsUser: 0 # Chạy quyền root để dùng được docker socket
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts
          ports:
            - containerPort: 8080
            - containerPort: 50000
          volumeMounts:
            - name: jenkins-data
              mountPath: /var/jenkins_home
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock # Mount socket từ EC2 vào trong Pod
        - name: jenkins-data
          emptyDir: {}
