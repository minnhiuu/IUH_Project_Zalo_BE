apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: bondhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      nodeSelector:
        node-type: infra
      securityContext:
        runAsUser: 0
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts
          env:
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            - name: PATH
              value: "/var/jenkins_home/tools:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          ports:
            - containerPort: 8080
            - containerPort: 50000
          volumeMounts:
            - name: jenkins-data
              mountPath: /var/jenkins_home
        # Docker-in-Docker sidecar
        - name: dind
          image: docker:27.3.1-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
      volumes:
        - name: jenkins-data
          emptyDir: {}
        - name: docker-storage
          emptyDir: {}
