apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: bondhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      nodeSelector:
        node-type: infra
      securityContext:
        runAsUser: 0 # Bắt buộc phải là root để cài được phần mềm
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts
          ports:
            - containerPort: 8080
            - containerPort: 50000
          lifecycle:
            postStart:
              exec:
                command: 
                  - "/bin/sh"
                  - "-c"
                  - |
                    apt-get update && \
                    apt-get install -y apt-transport-https ca-certificates curl gnupg lsb-release && \
                    curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.asc && \
                    echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.asc] https://download.docker.com/linux/debian $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list && \
                    apt-get update && \
                    apt-get install -y docker-ce-cli
          volumeMounts:
            - name: jenkins-data
              mountPath: /var/jenkins_home
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock # Mount socket từ EC2 vào trong Pod
        - name: jenkins-data
          emptyDir: {}
